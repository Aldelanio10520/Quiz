<!DOCTYPE html>
<html lang="pt-br">
    <head>
        <meta charset="UTF-8">
        <title>Loren Fernandes</title>
        <meta name="description" content="Um quiz interativo para testar meus conhecimentos">
    </head>
    <body>
        <!-- cabeçalho da pagina -->
         <header>
            <h1>Loren Fernandes</h1>
            <h3>"Você cuida do seu propósito, eu cuido do seu patrimônio."</h3>

         </header>

        <!-- corpo da pagina -->
         <main>
            <!--introducao-->
            <section>
                <h2>Informações Básicas</h2>
                <label for="nome">Nome Completo *</label><br>
                <input type="text" id="nome" name="nome" placeholder="Digite seu nome completo"><br><br>
                <label for="cpf">CPF *</label><br>
                <input type="number" id="cpf" name="cpf" placeholder="000.000.000-00"><br><br>
                <label for="telefone">Telefone *</label><br>
                <input type="number" id="telefone" name="telefone" placeholder="(00) 00000-0000"><br><br>
                <label for="datanascimento">Data de Nascimento *</label><br>
                <input type="date" id="datanascimento" name="datanascimento"><br>
            </section>
            <section>
                <form>
                    <h2>Insira os documentos</h2>
                    <div class="drop-zone" id="drop-zone">
                        <div class="icon">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8e9aaf" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                        </div>
                        <p class="main-text">RG, CPF, Comprovante de residência, Declaração do ano anterior, Informes de rendimentos, CPF dos dependentes, Recibos de saúde</p>
                        
                        <input type="file" id="file-input" hidden multiple accept=".pdf,.jpg,.png">
                    </div>
                    <button onclick="alert('Feedback enviado')">Concluir e Enviar</button>
                </form>
         </main>

        <!-- rodape da pagina -->
         <footer>
            <p>Para me conhecer <a href="https://www.instagram.com/lorenf.contadora?igsh=MWg0aW51YW1tNHVrNQ==" target="_blank">Clique Aqui</a></p>
         
            <script>
                const dropZone = document.getElementById('drop-zone');
                const fileInput = document.getElementById('file-input');

                // 1. Ao clicar na div, abre a janela de arquivos
                dropZone.addEventListener('click', () => {
                fileInput.click();
                });

                // 2. Quando o usuário selecionar o arquivo, você pode tratar aqui
                fileInput.addEventListener('change', () => {
                if (fileInput.files.length > 0) {
                    const fileName = fileInput.files[0].name;
                    alert('Arquivo selecionado: ' + fileName);
                    // Aqui você enviaria o arquivo para o seu backend ou processaria os dados
                }
                });
            </script>
    </body>
</html>
